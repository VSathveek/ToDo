{% extends 'base.html' %}
{% block title %}Task Created{% endblock %}

{% block content %}
<div class="page-panel success-panel">
  <h1>Task Created Successfully!</h1>
  <p>Your task "<strong>{{ task.name }}</strong>" has been created. Use the links below to continue managing your project.</p>
  <div class="button-container">
    <a href="{% url 'view_document' task.id %}" class="btn primary-btn">View Document</a>
    <a href="{% url 'home' %}" class="btn secondary-btn">Back to Dashboard</a>
  </div>
</div>
{% endblock %}
