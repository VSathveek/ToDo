{% extends "base.html" %}

{% block content %}
<div class="whiteboard-form">
    <h2>Create New Whiteboard</h2>
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="id_name">Room Name:</label>
            {{ form.name }}
        </div>
        <div class="form-group">
            <label for="id_password">Password (optional):</label>
            {{ form.password }}
        </div>
        <button type="submit" class="btn btn-primary">Create</button>
    </form>
</div>
{% endblock %}
