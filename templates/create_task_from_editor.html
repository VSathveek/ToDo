{% extends 'base.html' %}
{% load static %}
{% block content %}
<div class="task-form-container show">
  <div class="task-form">
    <h2 class="task-form-title" style="font-family: 'Urbanist', sans-serif;
    font-optical-sizing: auto;
    font-style: normal;color:rgba(0, 0, 0, 0.638)">Creating Task from editor</h2>
    <form id="create-task-form" method="POST" enctype="multipart/form-data">
      {% csrf_token %}

      <!-- Task Name -->
      <div class="form-group">
        <label for="taskName">Task Name <i class="fa fa-asterisk" style="color:red;font-size:10px;position: relative;top:-6px"></i></label>
        <input type="text" id="taskName" name="name" required>
      </div>

      <!-- Description -->
      <div class="form-group">
        <label for="description">Description (Max 1000 chars):</label>
        <textarea id="description" name="description" maxlength="1000"></textarea>
      </div>

      <!-- Assign To -->
      <div class="form-group">
        <label for="assignee">Assign To:</label>
        <input type="text" id="assignee" name="assignee">
      </div>

      <!-- Mention Users -->
      <div class="form-group">
        <label for="mention">@Mention:</label>
        <input type="text" id="mention" name="mention" placeholder="Enter usernames (comma-separated)">
      </div>

      <!-- Checklist -->
      <!--<div class="form-group">
        <label for="checklist">Checklist</label>
        <textarea id="checklist" name="checklist" placeholder='[{"task": "Subtask 1", "completed": false}]'></textarea>
      </div>-->
      <div class="form-group">
        <label for="checklist">Checklist:</label>
        <!-- Container where checklist items will be displayed -->
        <div id="checklistItems">
            <!-- Dynamically added checklist items appear here -->
        </div>
        <!-- Hidden input to hold the JSON string of checklist items -->
        <input type="hidden" name="checklist" id="checklistInput" value="[]">
        
        <!-- Button to show the inline input field -->
        <button type="button" id="showChecklistInput" class="add-checklist-btn" style="width:200px;height: 50px;">+ Add Checklist Item</button>
        
        <!-- Inline input field container (hidden by default) -->
        <div id="newChecklistItemContainer" style="display: none; margin-top: 0.5rem;">
          <input type="text" id="newChecklistItem" placeholder="Enter checklist item" style="width: 80%; padding: 0.5rem;">
          <button type="button" id="saveChecklistItem" class="add-checklist-btn">Add</button>
        </div>
      </div>

      <!-- Dates -->
      <div class="form-group">
        <label for="deadline">Deadline:</label>
        <input type="date" id="deadline" name="deadline">
      </div>

      <div class="form-group">
        <label for="start_task_on">Start Task On:</label>
        <input type="date" id="start_task_on" name="start_task_on">
      </div>


      <!-- Tags -->
      <div class="form-group">
        <label for="tags">Tags (comma-separated):</label>
        <input type="text" id="tags" name="tags" placeholder="e.g. Urgent, Review">
      </div>

      <!-- Document Fields -->
      <div class="form-group">
        <label for="document_name">Document Name:</label>
        <input type="text" id="document_name" name="document_name" placeholder="Enter document name (optional)">
      </div>
      <input type="hidden" name="document_content" id="document_content">

      <!-- Submit & Cancel Buttons -->
      <div class="form-buttons">
        <button type="submit" class="submit-btn">Add Task</button>
        <button type="button" id="cancelTask" class="cancel-btn">Cancel</button>
      </div>
    </form>
  </div>
</div>

<script>
  document.addEventListener("DOMContentLoaded", function() {
    document.getElementById("document_content").value = sessionStorage.getItem("editorContent") || "";
    const createTaskForm = document.getElementById("create-task-form");
    const submitBtn = document.querySelector(".submit-btn");

    submitBtn.addEventListener("click", function() {
      document.getElementById("document_content").value = sessionStorage.getItem("editorContent") || "";
      createTaskForm.submit();
    });
  });


</script>

{% endblock %}
