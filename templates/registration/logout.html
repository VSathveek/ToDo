{% extends 'base.html' %}
{% block title %}Logged Out{% endblock %}
{% block body_class %}auth-page{% endblock %}

{% block content %}
<div class="content-container auth-form-page">
  <div class="form-panel success-panel">
    <h1>Logged Out Successfully</h1>
    <p>You have been signed out. Come back anytime to manage your tasks.</p>
    <div class="button-container">
      <a href="{% url 'login' %}" class="btn primary-btn">Go to Login</a>
    </div>
  </div>
</div>
{% endblock %}
