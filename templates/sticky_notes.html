{% extends "base.html" %}

{% block content %}
<div class="sticky-notes-app">
    <h1 style="font-family: 'Urbanist', sans-serif;font-optical-sizing: auto;
    font-style: normal;       font-size: 2.5rem;
      font-weight: 700;
      text-align: center;

      color: #4a4a4a;">Sticky Notes</h1>
    
    <button id="create-note-btn" class="create-btn" onclick="openCreateModal()">
        + Create New Note
    </button>
    
    <div id="notes-container" class="notes-grid">
        <!-- Notes will be loaded here via JavaScript -->
    </div>
</div>

<!-- Note Modal -->
<div id="note-modal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <h2 id="modal-title">New Note</h2>
        
        <form id="note-form">
            <input type="hidden" id="note-id">
            
            <div class="form-group">
                <label for="note-title">Title</label>
                <input type="text" id="note-title" style="width:480px;border:lightblue;" placeholder="Note title">
            </div>
            
            <div class="form-group">
                <label for="note-content">Content</label>
                <textarea id="note-content"style="width:480px;" placeholder="Write your note here..."></textarea>
            </div>
            
            <div class="form-group">
                <label>Color</label>
                <div class="color-options">
                    <div class="color-option selected" data-color="#fff9c4" style="background-color: #fff9c4;"></div>
                    <div class="color-option" data-color="#c8e6c9" style="background-color: #c8e6c9;"></div>
                    <div class="color-option" data-color="#bbdefb" style="background-color: #bbdefb;"></div>
                    <div class="color-option" data-color="#ffccbc" style="background-color: #ffccbc;"></div>
                    <div class="color-option" data-color="#d1c4e9" style="background-color: #d1c4e9;"></div>
                    <div class="color-option" data-color="#f8bbd0" style="background-color: #f8bbd0;"></div>
                </div>
            </div>
            
            <div class="form-actions">
                <button type="button" class="cancel-btn" onclick="closeModal()">Cancel</button>
                <button type="button" class="save-btn" onclick="saveNote()">Save Note</button>
            </div>
        </form>
    </div>
</div>

<style>
    /* CSS Styles */
    .sticky-notes-app {
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px;
        font-family: Arial, sans-serif;
    }
    
    .sticky-notes-app h1 {
        color: #333;
        text-align: center;
        margin-bottom: 20px;
    }
    
    .create-btn {
        background-color: #6a64f1;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 16px;
        margin-bottom: 20px;
    }
    
    .create-btn:hover {
        background-color: #524bcd;
    }
    
    .notes-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 20px;
    }
    
    .note-card {
        border-radius: 8px;
        padding: 15px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        min-height: 200px;
        display: flex;
        flex-direction: column;
        position: relative;
        transition: transform 0.2s;
    }
    
    .note-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
    
    .note-title {
        font-weight: bold;
        margin-bottom: 10px;
        border-bottom: 1px dashed rgba(0,0,0,0.2);
        padding-bottom: 5px;
    }
    
    .note-content {
        flex-grow: 1;
        margin-bottom: 15px;
        white-space: pre-wrap;
    }
    
    .note-footer {
        font-size: 0.8rem;
        color: #666;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    
    .note-actions {
        display: flex;
        gap: 5px;
    }
    
    .note-actions button {
        background: none;
        border: none;
        cursor: pointer;
        opacity: 0.7;
        transition: opacity 0.2s;
    }
    
    .note-actions button:hover {
        opacity: 1;
    }
    
    /* Modal Styles */
/* Modal Styles */
.modal {
    display: none;
    position: fixed;
    z-index: 100;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background-color: rgba(0,0,0,0.4);

}

.modal-content {
    background-color: #fefefe;
    margin: 10% auto;
    padding: 20px;
    border-radius: 8px;
    width: 100%;
    max-width: 500px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);

}

.close-btn {
    color: #0d0d0d;
    float: left;
    font-size: 28px;
    font-weight: bold;
    cursor: pointer;
    position: absolute;
    top:0px;
    right:15px;
    width:25px;
    height: 50px;

    
}

.close-btn:hover {
    color:white;
    background-color: #e41414;

}

.form-group {
    margin-bottom: 15px;
}

.form-group label {
    display: block;
    margin-bottom: 5px;
    font-weight: bold;
}

/* Title Input */
.form-group input.noteTitleInput {
    width: 70%; /* Adjust the width as needed */
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 4px;
    font-family: inherit;
    box-sizing: border-box; /* Ensure padding is included in the element's total width */
}

/* Textarea */
.form-group textarea {
    min-height: 150px;
    max-height: 200px; /* Limit the height of the textarea */
    resize: vertical;
    width: 100%; /* Ensure textarea takes full width */
    padding: 10px;
    box-sizing: border-box;
}

.color-options {
    display: flex;
    gap: 10px;
    margin-top: 5px;
}

.color-option {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
}

.color-option.selected {
    border-color: #333;
}

.form-actions {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 20px;
}

.cancel-btn {
    background-color: #393838;
    padding: 8px 16px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
}

.cancel-btn:hover {
    background-color: #3f3e3e;
}

.save-btn {
    background-color: #6a64f1;
    color: white;
    padding: 8px 16px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    width:200px;
}

.save-btn:hover {
    background-color: #45a049;
}

</style>

<script>
    // Global variables
    let currentNoteId = null;
    let selectedColor = '#fff9c4';
    
    // When the page loads
    document.addEventListener('DOMContentLoaded', function() {
        loadNotes();
        setupColorPicker();
    });
    
    // Load all notes from the server
    function loadNotes() {
        fetch('/api/sticky-notes/')
            .then(response => response.json())
            .then(notes => {
                const container = document.getElementById('notes-container');
                container.innerHTML = '';
                
                notes.forEach(note => {
                    container.appendChild(createNoteElement(note));
                });
            })
            .catch(error => console.error('Error loading notes:', error));
    }
    
    // Create a note card element
    function createNoteElement(note) {
        const noteEl = document.createElement('div');
        noteEl.className = 'note-card';
        noteEl.style.backgroundColor = note.color;
        
        noteEl.innerHTML = `
            <div class="note-title">${note.title || 'Untitled Note'}</div>
            <div class="note-content">${note.content || ''}</div>
            <div class="note-footer">
                <small>${new Date(note.updated_at).toLocaleString()}</small>
                <div class="note-actions">
                    <button onclick="openEditModal('${note.id}')">
                        <i class="fas fa-edit"></i>
                    </button>
                    <button onclick="deleteNote('${note.id}')">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            </div>
        `;
        
        return noteEl;
    }
    
    // Set up color picker functionality
    function setupColorPicker() {
        document.querySelectorAll('.color-option').forEach(option => {
            option.addEventListener('click', function() {
                document.querySelectorAll('.color-option').forEach(opt => {
                    opt.classList.remove('selected');
                });
                this.classList.add('selected');
                selectedColor = this.dataset.color;
            });
        });
    }
    
    // Open modal for creating a new note
    function openCreateModal() {
        currentNoteId = null;
        document.getElementById('modal-title').textContent = 'New Note';
        document.getElementById('note-id').value = '';
        document.getElementById('note-title').value = '';
        document.getElementById('note-content').value = '';
        
        // Reset color selection
        document.querySelectorAll('.color-option').forEach((option, index) => {
            option.classList.remove('selected');
            if (index === 0) {
                option.classList.add('selected');
                selectedColor = option.dataset.color;
            }
        });
        
        document.getElementById('note-modal').style.display = 'block';
    }
    
    // Open modal for editing an existing note
    function openEditModal(noteId) {
        fetch(`/api/sticky-notes/${noteId}/`)
            .then(response => response.json())
            .then(note => {
                currentNoteId = note.id;
                document.getElementById('modal-title').textContent = 'Edit Note';
                document.getElementById('note-id').value = note.id;
                document.getElementById('note-title').value = note.title || '';
                document.getElementById('note-content').value = note.content || '';
                
                // Set color selection
                document.querySelectorAll('.color-option').forEach(option => {
                    option.classList.remove('selected');
                    if (option.dataset.color === note.color) {
                        option.classList.add('selected');
                        selectedColor = option.dataset.color;
                    }
                });
                
                document.getElementById('note-modal').style.display = 'block';
            })
            .catch(error => console.error('Error loading note:', error));
    }
    
    // Close the modal
    function closeModal() {
        document.getElementById('note-modal').style.display = 'none';
    }
    
    // Save a note (create or update)
    function saveNote() {
        const title = document.getElementById('note-title').value;
        const content = document.getElementById('note-content').value;
        
        if (!title && !content) {
            alert('Please enter either a title or content');
            return;
        }
        
        const noteData = {
            title: title,
            content: content,
            color: selectedColor
        };
        
        const url = currentNoteId ? `/api/sticky-notes/${currentNoteId}/` : '/api/sticky-notes/create/';
        const method = currentNoteId ? 'PUT' : 'POST';
        
        fetch(url, {
            method: method,
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': getCookie('csrftoken'),
            },
            body: JSON.stringify(noteData)
        })
        .then(response => {
            if (!response.ok) throw new Error('Network response was not ok');
            return response.json();
        })
        .then(() => {
            closeModal();
            loadNotes();
        })
        .catch(error => {
            console.error('Error saving note:', error);
            alert('Error saving note: ' + error.message);
        });
    }
    
    // Delete a note
    function deleteNote(noteId) {
        if (confirm('Are you sure you want to delete this note?')) {
            fetch(`/api/sticky-notes/${noteId}/`, {
                method: 'DELETE',
                headers: {
                    'X-CSRFToken': getCookie('csrftoken'),
                }
            })
            .then(response => {
                if (response.ok) {
                    loadNotes();
                } else {
                    throw new Error('Failed to delete note');
                }
            })
            .catch(error => {
                console.error('Error deleting note:', error);
                alert('Error deleting note');
            });
        }
    }
    
    // Helper function to get CSRF token
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }
    
    // Close modal when clicking outside of it
    window.addEventListener('click', function(event) {
        if (event.target === document.getElementById('note-modal')) {
            closeModal();
        }
    });
</script>
{% endblock %}
