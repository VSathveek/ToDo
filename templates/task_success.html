{% extends 'base.html' %}
{% load static %}
{% block title %}Task Created Successfully{% endblock %}
{% block content %}
<style>

.success-container {
    max-width: 600px;
    margin: 50px auto;
    padding: 2rem;
    background-color: #fff;
    border-radius: 10px;
    box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
    text-align: center;
}

h1 {
    font-family: "Urbanist", sans-serif;
    color: #2C3E50;
    font-size: 2rem;
    font-weight: 600;
    margin-bottom: 1.5rem;
}

p {
    font-family: "Urbanist", sans-serif;
    color: #34495E;
    font-size: 1.125rem;
    line-height: 1.6;
}

.button-container {
    margin-top: 2rem;
}

a.btn {
    text-decoration: none;
    display: inline-block;
    padding: 12px 25px;
    border-radius: 5px;
    font-size: 1.1rem;
    font-weight: 500;
    transition: background-color 0.3s ease-in-out;
    border: none;
}

a.btn-primary {
    font-family: "Urbanist", sans-serif;
    background-color: #5145BA;
    color: #fff;
}

a.btn-primary:hover {
    background-color: #4a40ab;
}

a.btn-secondary {
    font-family: "Urbanist", sans-serif;
    background-color: #5d5858;
    color: #fff;
}

a.btn-secondary:hover {
    background-color: #95A5A6;
}
</style>
<div class="success-container">
    <h1>Task Created Successfully!</h1>
    <p>Your task "<strong>{{ task.name }}</strong>" has been successfully created. You can view or manage it below.</p>
    <div class="button-container">
        <a href="{% url 'view_document' task.id %}" class="btn btn-primary">View Document</a>
        <a href="{% url 'home' %}" class="btn btn-secondary">Back to Dashboard</a>
    </div>

</div>
{% endblock %}
